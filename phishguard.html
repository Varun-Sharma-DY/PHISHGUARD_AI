  /* ── Background ── */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: rgba(220,240,248,0.15);
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; display: none;
  }

  /* ── Layout ── */
  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── Nav ── */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 20px;
  }
  .logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #0a2a50 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo span { font-weight: 400; opacity: 0.6; }
  .nav-badge {
    font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em;
    padding: 5px 12px; border-radius: 100px;
    border: 1px solid rgba(0,140,200,0.25);
    color: var(--text-muted);
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
  }

  /* ── Hero Ellipse ── */
  .hero-wrap {
    display: flex; align-items: center; justify-content: center;
    padding: 36px 0 32px; position: relative;
  }
  .hero-ellipse {
    position: relative;
    width: 100%; max-width: 940px;
    height: 118px;
    border-radius: 200px;
    background: linear-gradient(135deg, rgba(255,255,255,0.75) 0%, rgba(220,240,255,0.85) 100%);
    border: 1px solid transparent;
    background-clip: padding-box;
    box-shadow:
      0 0 0 1px rgba(77,143,255,0.18),
      0 0 40px rgba(77,143,255,0.08),
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero-ellipse::before {
    content: '';
    position: absolute; inset: 0; border-radius: 200px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(77,143,255,0.04) 30%,
      rgba(100,180,255,0.08) 50%,
      rgba(77,143,255,0.04) 70%,
      transparent 100%);
    pointer-events: none;
  }

  .hero-words {
    display: flex; align-items: center; justify-content: center;
    gap: 0; width: 100%; padding: 0 56px;
  }
  .hero-word {
    flex: 1; text-align: center;
    font-family: 'Syne', sans-serif; font-weight: 700;
    color: rgba(13,42,63,0.5);
    transition: all 0.5s ease;
    white-space: nowrap;
    cursor: default;
    user-select: none;
  }
  .hero-word.center {
    color: #0055aa;
    text-shadow: 0 0 20px rgba(0,100,200,0.3), 0 0 40px rgba(0,100,200,0.15);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 15px rgba(0,100,200,0.3), 0 0 30px rgba(0,100,200,0.1); }
    50%       { text-shadow: 0 0 25px rgba(0,100,200,0.5), 0 0 50px rgba(0,100,200,0.2); }
  }
  .hero-word:nth-child(1), .hero-word:nth-child(7) { font-size: 0.72rem; opacity: 0.45; flex: 0.7; }
  .hero-word:nth-child(2), .hero-word:nth-child(6) { font-size: 0.85rem; opacity: 0.55; flex: 0.85; }
  .hero-word:nth-child(3), .hero-word:nth-child(5) { font-size: 1.05rem; opacity: 0.7;  flex: 0.95; }
  .hero-word:nth-child(4)                          { font-size: 1.55rem; flex: 1.3; }

  .hero-arrow {
    position: absolute;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(0,140,200,0.2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 2;
    transition: all 0.2s ease;
    color: var(--text-muted); font-size: 0.9rem;
    backdrop-filter: blur(8px);
  }
  .hero-arrow:hover {
    background: rgba(0,119,204,0.12);
    border-color: rgba(0,119,204,0.4);
    color: var(--accent);
    box-shadow: 0 0 16px rgba(77,143,255,0.2);
  }
  .hero-arrow.left  { left: -18px; }
  .hero-arrow.right { right: -18px; }

  /* ── Tagline ── */
  .tagline {
    text-align: center; padding-bottom: 44px;
    font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-muted);
  }
  .tagline strong {
    color: var(--accent); letter-spacing: 0.1em;
  }

  /* ── Input Section ── */
  .input-section { margin-bottom: 24px; }

  .input-label {
    font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; color: rgba(0,60,120,0.6);
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .input-label::before {
    content: ''; display: block; width: 4px; height: 4px;
    border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  .input-wrap {
    position: relative;
    border-radius: 16px;
    background: rgba(255,255,255,0.65);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .input-wrap:focus-within {
    border-color: rgba(77,143,255,0.35);
    box-shadow: 0 0 0 3px rgba(77,143,255,0.08), 0 8px 32px rgba(0,0,0,0.3);
  }

  .prompt-line {
    display: flex; align-items: flex-start; padding: 20px 20px 0;
    gap: 10px;
  }
  .prompt-char {
    font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
    color: var(--accent); opacity: 0.7; margin-top: 2px; flex-shrink: 0;
  }
  .main-textarea {
    flex: 1; background: none; border: none; outline: none; resize: none;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 300;
    color: var(--text); line-height: 1.65;
    min-height: 100px;
  }
  .main-textarea::placeholder { color: rgba(13,42,63,0.3); }

  .input-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }
  .char-count { font-size: 0.72rem; color: var(--text-muted); }

  .analyze-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 28px; border-radius: 100px;
    background: linear-gradient(135deg, #2a5fd4, #1a3fa0);
    border: 1px solid rgba(77,143,255,0.4);
    color: #fff; font-family: 'Syne', sans-serif;
    font-size: 0.85rem; font-weight: 600; letter-spacing: 0.04em;
    cursor: pointer; transition: all 0.25s ease;
    box-shadow: 0 4px 20px rgba(42,95,212,0.3);
  }
  .analyze-btn:hover:not(:disabled) {
    background: linear-gradient(135deg, #3570e8, #2254c4);
    box-shadow: 0 6px 28px rgba(42,95,212,0.45);
    transform: translateY(-1px);
  }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .analyze-btn .btn-icon { font-size: 0.9rem; }

  /* ── Language Selector ── */
  .lang-section { margin-bottom: 36px; }
  .lang-label {
    font-size: 0.68rem; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 12px;
  }
  .lang-scroll-wrap {
    position: relative;
    overflow: hidden;
  }
  .lang-scroll-wrap::before,
  .lang-scroll-wrap::after {
    content: ''; position: absolute; top: 0; bottom: 0; z-index: 2;
    width: 48px; pointer-events: none;
  }
  .lang-scroll-wrap::before {
    left: 0;
    background: linear-gradient(90deg, rgba(200,235,245,0.9), transparent);
  }
  .lang-scroll-wrap::after {
    right: 0;
    background: linear-gradient(270deg, rgba(200,235,245,0.9), transparent);
  }
  .lang-scroll {
    display: flex; gap: 8px;
    overflow-x: auto; padding: 4px 4px 8px;
    scroll-behavior: smooth;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .lang-scroll::-webkit-scrollbar { display: none; }

  .lang-pill {
    flex-shrink: 0;
    padding: 7px 16px; border-radius: 100px;
    font-size: 0.78rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s ease;
    white-space: nowrap; border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    position: relative;
  }
  .lang-pill:hover { background: var(--surface-hover); color: var(--text); }
  .lang-pill.active {
    background: rgba(77,143,255,0.12);
    border-color: rgba(77,143,255,0.45);
    color: var(--accent);
    box-shadow: 0 0 14px rgba(77,143,255,0.15);
  }
  .lang-pill.coming-soon { opacity: 0.45; }
  .lang-pill.coming-soon::after {
    content: '·';
    position: absolute; top: -2px; right: 4px;
    font-size: 1.1rem; color: var(--text-muted);
  }

  /* ── Result Card ── */
  .result-card {
    border-radius: 20px;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(100,180,220,0.3);
    backdrop-filter: blur(24px);
    padding: 32px;
    animation: fadeSlideUp 0.45s cubic-bezier(0.16,1,0.3,1);
    box-shadow: 0 12px 48px rgba(0,80,160,0.1), 0 2px 8px rgba(0,0,0,0.06);
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 20px;
    margin-bottom: 28px; flex-wrap: wrap;
  }
  .verdict-block { display: flex; align-items: center; gap: 16px; }
  .verdict-icon {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; flex-shrink: 0;
  }
  .verdict-icon.scam       { background: rgba(255,77,109,0.12); box-shadow: 0 0 20px rgba(255,77,109,0.15); }
  .verdict-icon.suspicious { background: rgba(255,170,44,0.12); box-shadow: 0 0 20px rgba(255,170,44,0.15); }
  .verdict-icon.safe       { background: rgba(45,212,160,0.12); box-shadow: 0 0 20px rgba(45,212,160,0.15); }

  .verdict-label {
    font-family: 'Syne', sans-serif; font-size: 1.9rem; font-weight: 800;
    letter-spacing: -0.03em; line-height: 1;
  }
  .verdict-label.scam       { color: var(--danger); }
  .verdict-label.suspicious { color: var(--warn); }
  .verdict-label.safe       { color: var(--safe); }

  .verdict-sub {
    font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; font-weight: 400;
  }

  .score-block { text-align: right; }
  .score-num {
    font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 800;
    letter-spacing: -0.04em; line-height: 1;
  }
  .score-num.scam       { color: var(--danger); }
  .score-num.suspicious { color: var(--warn); }
  .score-num.safe       { color: var(--safe); }
  .score-label { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* Score bar */
  .score-bar-wrap {
    height: 4px; border-radius: 100px;
    background: rgba(0,80,160,0.1);
    margin-bottom: 28px; overflow: hidden;
  }
  .score-bar {
    height: 100%; border-radius: 100px;
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  }
  .score-bar.scam       { background: linear-gradient(90deg, #ff4d6d, #ff2244); box-shadow: 0 0 8px rgba(255,77,109,0.5); }
  .score-bar.suspicious { background: linear-gradient(90deg, #ffaa2c, #ff8c00); box-shadow: 0 0 8px rgba(255,170,44,0.5); }
  .score-bar.safe       { background: linear-gradient(90deg, #2dd4a0, #00c87a); box-shadow: 0 0 8px rgba(45,212,160,0.5); }

  /* Metadata grid */
  .meta-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .meta-cell {
    background: rgba(240,250,255,0.7);
    border: 1px solid rgba(100,180,220,0.2); border-radius: 12px;
    padding: 14px 16px;
  }
  .meta-cell-label { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px; }
  .meta-cell-value { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 600; color: var(--text); }

  /* Red flags */
  .flags-block { margin-bottom: 24px; }
  .flags-title { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .flags-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .flag-tag {
    padding: 6px 13px; border-radius: 100px; font-size: 0.75rem; font-weight: 500;
    background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2);
    color: rgba(255,140,155,0.9);
  }
  .flag-tag.url { background: rgba(255,170,44,0.08); border-color: rgba(255,170,44,0.2); color: rgba(255,200,100,0.9); }

  /* URLs */
  .urls-block { margin-bottom: 24px; }
  .url-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 10px; font-size: 0.78rem;
    background: rgba(255,170,44,0.07); border: 1px solid rgba(255,170,44,0.18);
    color: rgba(255,200,120,0.9); font-family: monospace;
    word-break: break-all; max-width: 100%;
  }

  /* Explanation */
  .explanation-block {
    background: rgba(240,250,255,0.6);
    border: 1px solid rgba(100,180,220,0.2); border-radius: 12px;
    padding: 18px 20px;
  }
  .explanation-title { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .explanation-text { font-size: 0.85rem; color: rgba(13,42,63,0.75); line-height: 1.7; }

  /* User message banner */
  .user-banner {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; border-radius: 12px; margin-bottom: 24px;
    font-size: 0.9rem; font-weight: 500;
  }
  .user-banner.scam       { background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2); color: #ff8898; }
  .user-banner.suspicious { background: rgba(255,170,44,0.08); border: 1px solid rgba(255,170,44,0.2); color: #ffcc70; }
  .user-banner.safe       { background: rgba(45,212,160,0.08); border: 1px solid rgba(45,212,160,0.2); color: #5ee8c0; }

  /* Loading state */
  .loading-wrap {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; padding: 60px;
  }
  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid rgba(77,143,255,0.15);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 8px 0 24px; }

  /* Responsive */
  @media (max-width: 680px) {
    .hero-ellipse { height: 90px; }
    .hero-word:nth-child(4) { font-size: 1.15rem; }
    .hero-word:nth-child(3), .hero-word:nth-child(5) { font-size: 0.82rem; }
    .hero-word:nth-child(2), .hero-word:nth-child(6) { font-size: 0.7rem; }
    .hero-word:nth-child(1), .hero-word:nth-child(7) { display: none; }
    .result-header { flex-direction: column; }
    .score-block { text-align: left; }
  }
</style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="bg-grid"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Data ─────────────────────────────────────────────────────────── */
const ALL_LANGUAGES = [
  { code: "hi", label: "Hindi",       native: "नमस्ते",        supported: true  },
  { code: "en", label: "English",     native: "WELCOME",        supported: true  },
  { code: "mr", label: "Marathi",     native: "स्वागत",         supported: true  },
  { code: "bn", label: "Bengali",     native: "স্বাগতম",        supported: false },
  { code: "te", label: "Telugu",      native: "స్వాగతం",        supported: false },
  { code: "ta", label: "Tamil",       native: "வரவேற்பு",       supported: false },
  { code: "gu", label: "Gujarati",    native: "સ્વાગત",         supported: false },
  { code: "kn", label: "Kannada",     native: "ಸ್ವಾಗತ",         supported: false },
  { code: "ml", label: "Malayalam",   native: "സ്വാഗതം",        supported: false },
  { code: "pa", label: "Punjabi",     native: "ਸਵਾਗਤ",         supported: false },
  { code: "or", label: "Odia",        native: "ସ୍ୱାଗତ",         supported: false },
  { code: "as", label: "Assamese",    native: "স্বাগতম",        supported: false },
  { code: "ur", label: "Urdu",        native: "خوش آمدید",      supported: false },
  { code: "sa", label: "Sanskrit",    native: "स्वागतम्",       supported: false },
  { code: "kok",label: "Konkani",     native: "स्वागत",         supported: false },
  { code: "mni",label: "Manipuri",    native: "ꯈꯨꯔꯨꯝꯖꯔꯤ",       supported: false },
  { code: "ne", label: "Nepali",      native: "स्वागत",         supported: false },
  { code: "mai",label: "Maithili",    native: "स्वागत",         supported: false },
  { code: "sd", label: "Sindhi",      native: "سُواگت",         supported: false },
  { code: "sat",label: "Santali",     native: "ᱥᱟᱜᱟᱛ",         supported: false },
  { code: "brx",label: "Bodo",        native: "स्वागत",         supported: false },
  { code: "doi",label: "Dogri",       native: "स्वागत",         supported: false },
  { code: "raj",label: "Rajasthani",  native: "खम्मा घणी",      supported: false },
  { code: "bho",label: "Bhojpuri",    native: "स्वागत बा",      supported: false },
  { code: "ks", label: "Kashmiri",    native: "خوش آمدید",      supported: false },
  { code: "hne",label: "Chhattisgarhi",native:"स्वागत",         supported: false },
  { code: "bgc",label: "Haryanvi",    native: "स्वागत",         supported: false },
  { code: "kha",label: "Khasi",       native: "Khlaw ia",       supported: false },
  { code: "lus",label: "Mizo",        native: "Chibai",         supported: false },
];

// 7 hero words: positions 0–6, center is index 3
const HERO_DISPLAY = [
  { lang: "Marathi",   text: "स्वागत"    },
  { lang: "Bengali",   text: "স্বাগতম"   },
  { lang: "Punjabi",   text: "ਸਵਾਗਤ"    },
  { lang: "Hindi",     text: "नमस्ते",   center: true },
  { lang: "Gujarati",  text: "સ્વાગત"    },
  { lang: "Malayalam", text: "സ്വാഗതം"   },
  { lang: "Tamil",     text: "வரவேற்பு"  },
];

const HERO_CYCLE = ALL_LANGUAGES.map(l => `${l.label} — ${l.native}`);

/* ── Hero Section ──────────────────────────────────────────────────── */
function HeroSection() {
  const [cycleIdx, setCycleIdx] = useState(0);
  const [animating, setAnimating] = useState(false);

  const shift = (dir) => {
    if (animating) return;
    setAnimating(true);
    setTimeout(() => {
      setCycleIdx(i => (i + dir + HERO_CYCLE.length) % HERO_CYCLE.length);
      setAnimating(false);
    }, 200);
  };

  // Auto-cycle every 3s
  useEffect(() => {
    const t = setInterval(() => shift(1), 3000);
    return () => clearInterval(t);
  }, [animating]);

  return (
    <div className="hero-wrap">
      <div className="hero-ellipse">
        <button className="hero-arrow left" onClick={() => shift(-1)}>←</button>
        <div className="hero-words" style={{ opacity: animating ? 0.4 : 1, transition: 'opacity 0.2s' }}>
          {HERO_DISPLAY.map((w, i) => (
            <div key={i} className={`hero-word${w.center ? ' center' : ''}`}>
              {w.center ? HERO_CYCLE[cycleIdx] : w.text}
            </div>
          ))}
        </div>
        <button className="hero-arrow right" onClick={() => shift(1)}>→</button>
      </div>
    </div>
  );
}

/* ── Language Selector ─────────────────────────────────────────────── */
function LanguageSelector({ selected, onSelect }) {
  return (
    <div className="lang-section">
      <div className="input-label">Response Language</div>
      <div style={{
        position: 'relative',
        maxWidth: '320px',
      }}>
        <select
          value={selected}
          onChange={e => onSelect(e.target.value)}
          style={{
            width: '100%',
            appearance: 'none',
            WebkitAppearance: 'none',
            background: 'rgba(255,255,255,0.65)',
            border: '1px solid rgba(100,180,220,0.3)',
            borderRadius: '12px',
            padding: '11px 44px 11px 16px',
            fontFamily: "'DM Sans', sans-serif",
            fontSize: '0.92rem',
            fontWeight: '500',
            color: 'var(--text)',
            cursor: 'pointer',
            backdropFilter: 'blur(20px)',
            boxShadow: '0 2px 12px rgba(0,80,160,0.08)',
            outline: 'none',
            transition: 'border-color 0.2s, box-shadow 0.2s',
          }}
          onFocus={e => {
            e.target.style.borderColor = 'rgba(77,143,255,0.45)';
            e.target.style.boxShadow = '0 0 0 3px rgba(77,143,255,0.10), 0 4px 16px rgba(0,0,0,0.12)';
          }}
          onBlur={e => {
            e.target.style.borderColor = 'rgba(100,180,220,0.3)';
            e.target.style.boxShadow = '0 2px 12px rgba(0,80,160,0.08)';
          }}
        >
          {ALL_LANGUAGES.map(lang => (
            <option key={lang.code} value={lang.code}>
              {lang.native}{lang.supported ? '' : ' ·'}
            </option>
          ))}
        </select>
        {/* Custom chevron */}
        <div style={{
          position: 'absolute', right: '14px', top: '50%',
          transform: 'translateY(-50%)',
          pointerEvents: 'none', color: 'var(--accent)', fontSize: '0.75rem',
        }}>▾</div>
      </div>
      {!ALL_LANGUAGES.find(l => l.code === selected)?.supported && (
        <div style={{
          marginTop: '8px', fontSize: '0.7rem',
          color: 'var(--text-muted)', letterSpacing: '0.05em',
        }}>
          ↳ This language isn't supported yet — defaulting to English
        </div>
      )}
    </div>
  );
}

/* ── Result Card ───────────────────────────────────────────────────── */
function ResultCard({ result }) {
  const status   = result.status || (result.is_scam ? 'scam' : 'safe');
  const score    = result.risk_score ?? 0;
  const category = (result.primary_category || result.category || 'unknown').replace(/_/g, ' ');
  const confidence = result.confidence_score ?? 0;

  const ICON  = { scam: '🚨', suspicious: '🔶', safe: '✅' };
  const LABEL = { scam: 'SCAM', suspicious: 'SUSPICIOUS', safe: 'SAFE' };
  const SUB   = { scam: 'High risk detected', suspicious: 'Proceed with caution', safe: 'No threats found' };

  const keywords = result.matched_keywords || [];
  const flags    = result.red_flags || [];
  const urlFlags = result.url_risk_flags || [];
  const urls     = result.detected_urls || [];
  const safeSigs = result.safe_signals_detected || [];

  // Strip markdown for clean display
  const explanation = (result.explanation_markdown || result.action || '')
    .replace(/#{1,3} /g, '').replace(/\*\*/g, '').replace(/\*/g, '').trim();

  return (
    <div className="result-card">
      {/* User message banner */}
      {result.user_message && (
        <div className={`user-banner ${status}`}>
          <span>{result.user_message}</span>
        </div>
      )}

      {/* Header */}
      <div className="result-header">
        <div className="verdict-block">
          <div className={`verdict-icon ${status}`}>{ICON[status]}</div>
          <div>
            <div className={`verdict-label ${status}`}>{LABEL[status]}</div>
            <div className="verdict-sub">{SUB[status]}</div>
          </div>
        </div>
        <div className="score-block">
          <div className={`score-num ${status}`}>{score}</div>
          <div className="score-label">Risk Score / 100</div>
        </div>
      </div>

      {/* Score bar */}
      <div className="score-bar-wrap">
        <div className={`score-bar ${status}`} style={{ width: `${score}%` }}></div>
      </div>

      {/* Metadata */}
      <div className="meta-grid">
        <div className="meta-cell">
          <div className="meta-cell-label">Category</div>
          <div className="meta-cell-value" style={{ textTransform: 'capitalize' }}>{category}</div>
        </div>
        <div className="meta-cell">
          <div className="meta-cell-label">Confidence</div>
          <div className="meta-cell-value">{confidence}%</div>
        </div>
        <div className="meta-cell">
          <div className="meta-cell-label">URLs Found</div>
          <div className="meta-cell-value">{urls.length}</div>
        </div>
        <div className="meta-cell">
          <div className="meta-cell-label">Keywords Hit</div>
          <div className="meta-cell-value">{keywords.length}</div>
        </div>
        {result.secondary_categories?.length > 0 && (
          <div className="meta-cell" style={{ gridColumn: 'span 2' }}>
            <div className="meta-cell-label">Also Detected</div>
            <div className="meta-cell-value" style={{ fontSize: '0.8rem', fontWeight: 400 }}>
              {result.secondary_categories.map(c => c.replace(/_/g, ' ')).join(', ')}
            </div>
          </div>
        )}
      </div>

      {/* Red flags */}
      {flags.length > 0 && (
        <div className="flags-block">
          <div className="flags-title">Risk Signals</div>
          <div className="flags-list">
            {flags.map((f, i) => (
              <span key={i} className={`flag-tag${urlFlags.includes(f) ? ' url' : ''}`}>{f}</span>
            ))}
          </div>
        </div>
      )}

      {/* Detected URLs */}
      {urls.length > 0 && (
        <div className="urls-block">
          <div className="flags-title">Detected URLs</div>
          {urls.map((u, i) => (
            <div key={i} className="url-chip">
              <span>🔗</span><span>{u}</span>
            </div>
          ))}
        </div>
      )}

      {/* Safe signals */}
      {safeSigs.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div className="flags-title" style={{ color: 'rgba(45,212,160,0.6)' }}>Safe Signals (Score Reduced)</div>
          <div className="flags-list">
            {safeSigs.map((s, i) => (
              <span key={i} className="flag-tag" style={{ background: 'rgba(45,212,160,0.08)', borderColor: 'rgba(45,212,160,0.2)', color: 'rgba(100,220,180,0.9)' }}>{s}</span>
            ))}
          </div>
        </div>
      )}

      {/* Explanation */}
      {explanation && (
        <div className="explanation-block">
          <div className="explanation-title">Recommendation</div>
          <div className="explanation-text">{result.action || explanation.split('\n')[0]}</div>
        </div>
      )}
    </div>
  );
}

/* ── Main App ──────────────────────────────────────────────────────── */
function App() {
  const [input, setInput]         = useState('');
  const [language, setLanguage]   = useState('en');
  const [loading, setLoading]     = useState(false);
  const [result, setResult]       = useState(null);
  const [error, setError]         = useState(null);
  const resultRef                 = useRef(null);

  const supportedLangs = { hi: true, en: true, mr: true };
  const apiLang = supportedLangs[language] ? language : 'en';

  const analyze = async () => {
    if (!input.trim()) return;
    setLoading(true); setResult(null); setError(null);

    // Extract first URL from input
    const urlMatch = input.match(/https?:\/\/[^\s]+/);
    const url = urlMatch ? urlMatch[0] : '';

    try {
      const res = await fetch('http://127.0.0.1:8000/detect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: input.trim(), url, language: apiLang }),
      });
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      setResult(data);
      setTimeout(() => resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    } catch (e) {
      if (e instanceof TypeError && e.message.includes('fetch')) {
        setError('Cannot connect to PhishGuard API on port 8000. Make sure you ran: python Phishguard.py --serve');
      } else if (e.message && e.message.includes('NetworkError')) {
        setError('Network error — CORS or firewall blocking the request. Try restarting the backend.');
      } else {
        setError('Error: ' + e.message);
      }
    } finally {
      setLoading(false);
    }
  };

  const handleKey = (e) => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) analyze(); };

  const langObj = ALL_LANGUAGES.find(l => l.code === language);

  return (
    <div className="app">
      {/* Nav */}
      <nav className="nav">
        <div className="logo">Phish<span>Guard</span></div>
        <div className="nav-badge">Multi-Signal Detection · v2.0</div>
      </nav>

      {/* Hero */}
      <HeroSection />

      {/* Tagline */}


      {/* Input */}
      <div className="input-section">
        <div className="input-label">Analyse Message</div>
        <div className="input-wrap">
          <div className="prompt-line">
            <span className="prompt-char">›</span>
            <textarea
              className="main-textarea"
              placeholder="Paste suspicious message or URL here..."
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
              rows={4}
            />
          </div>
          <div className="input-footer">
            <span className="char-count">{input.length} chars · Ctrl+Enter to analyse</span>
            <button className="analyze-btn" onClick={analyze} disabled={loading || !input.trim()}>
              {loading
                ? <><span className="btn-icon">⟳</span> Analysing…</>
                : <><span className="btn-icon">⚡</span> Analyze</>}
            </button>
          </div>
        </div>
      </div>

      {/* Language selector */}
      <LanguageSelector selected={language} onSelect={setLanguage} />

      {/* Result */}
      {loading && (
        <div className="result-card" style={{ padding: 0 }}>
          <div className="loading-wrap">
            <div className="spinner"></div>
            <div className="loading-text">Running multi-signal analysis…</div>
          </div>
        </div>
      )}

      {error && (
        <div className="result-card" style={{ borderColor: 'rgba(255,77,109,0.25)', background: 'rgba(255,77,109,0.05)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, color: '#ff8898' }}>
            <span style={{ fontSize: '1.3rem' }}>⚠</span>
            <span style={{ fontSize: '0.875rem' }}>{error}</span>
          </div>
        </div>
      )}

      {result && !loading && (
        <div ref={resultRef}>
          <ResultCard result={result} />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
